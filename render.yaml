databases:
  - name: oms-db
    databaseName: order_management
    user: postgres
    plan: free

services:
  - type: web
    name: oms-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URLS
        value: https://order-management-system-kappa-seven.vercel.app

  - type: web
    name: oms-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          name: oms-backend
          type: web
          property: host
          transform: "https://$VALUE"
